a.Create a Web Page using HTML which contains a Heading, Image and 2 hyperlinks. Each
hyperlink opens a new page in the same web browser. New page contains “Go Back” link that
takes you to the main page.


<!DOCTYPE html>
<html>

<head>
    <title>VJIT</title>
</head>

<body>
    <h1>Welcome to VJIT</h1>
    <img src="vjitlogo.jpg" alt="VJIT logo">
    <br><br>

    <a href="page1.html">Open Page 1</a>
    <br><br>

    <a href="page2.html">Open Page 2</a>
</body>

</html>
