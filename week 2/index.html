<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CSS Position Property</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        h2 {
            position: sticky;
            top: 0;
            background-color: #333;
            color: white;
            padding: 10px;
        }

        .box {
            width: 200px;
            height: 80px;
            margin: 20px;
            color: white;
            text-align: center;
            line-height: 80px;
        }

        .static {
            position: static;
            background-color: teal;
        }

        .relative {
            position: relative;
            top: 20px;
            left: 30px;
            background-color: orange;
        }

        .absolute {
            position: absolute;
            top: 300px;
            left: 50px;
            background-color: purple;
        }

        .fixed {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: red;
        }

        .content {
            height: 1000px;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 10px;
            background-color: #ddd;
        }
    </style>
</head>

<body>

    <h2>CSS Position Property Demo</h2>

    <div class="box static">Static Position</div>
    <div class="box relative">Relative Position</div>
    <div class="box absolute">Absolute Position</div>
    <div class="box fixed">Fixed Position</div>

    <div class="content">
        <p>Scroll down to observe sticky and fixed positions.</p>
    </div>

    <footer class="footer">
        Footer content
    </footer>

</body>

</html>
