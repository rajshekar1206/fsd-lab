) Write a JavaScript program to change the background color after clicking “change color”
button.

<!DOCTYPE html>
<html>

<head>
    <title>change background colour</title>
    <script>
        function changecolor() {
            document.body.style.backgroundColor = "blue";
        }
    </script>
</head>

<body>
    <form>
        <input type="button" onclick="changecolor()" value="change color">
    </form>
</body>

</html>
